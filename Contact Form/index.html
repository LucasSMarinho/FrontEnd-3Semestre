<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <title>Contact</title>
</head>

<body>
    <header class="form-header">
        <div class="container container--flex">
            <img class="form-header__image--perfil" src="./images/fa_drivers-license-o.svg" alt="Icone da contact form">
            <h1 class="form-header__text form-header__text--title">Contact Form</h1>
            <p class="form-header__text form-header__text--paragraph">Insira os dados de contato e clique em cadastrar!
            </p>
        </div>
    </header>

    <main>
        <div class="container">
            <form class="form-contact" action="">
                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="nome">Nome</label>
                    </div>
                    <div class="form-contact__col-b">
                        <input class="form-contact__imput form-contact__imput--metade" placeholder="Nome" type="text" id="nome" name="nome">
                        <input class="form-contact__imput form-contact__imput--metade" placeholder="Sobrenome" type="text" id="sobrenome" name="sobrenome">
                    </div>
                </div>

                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="Email">Email</label>
                    </div>
                    <div class="form-contact__col-b">
                        <input class="form-contact__imput form-contact__imput--inteiro" placeholder="Email" type="text" id="Email" name="email">
                    </div>
                </div>

                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="Phone">Telefone</label>
                    </div>
                    <div class="form-contact__col-b">
                        <input class="form-contact__imput form-contact__imput--inteiro" placeholder="+55" type="text" id="Phone" name="Phone">
                        <input class="form-contact__imput form-contact__imput--inteiro" placeholder="ddd" type="text" id="Phone" name="Phone">
                        <input class="form-contact__imput form-contact__imput--inteiro" placeholder="ex: 99999-9999" type="text" id="Phone" name="Phone">
                    </div>
                </div>

            </form>
        </div>
    </main>

    <footer>
        todos os diteitos reservados
    </footer>

</body>

</html>
